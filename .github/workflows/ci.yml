name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    name: ${{ matrix.os }} · ${{ matrix.compiler }} · ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        compiler: [gcc, clang]
        build_type: [Release]

    steps:
      - uses: actions/checkout@v4

      # ---- Dependencies (Linux) ----
      - name: Install dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            libgmp-dev libgmpxx4ldbl libmpfr-dev \
            python3 python3-pip
          pip3 install --break-system-packages sympy==1.14 || pip3 install sympy==1.14

      # ---- Pick compiler ----
      - name: Set compiler env (gcc)
        if: matrix.compiler == 'gcc'
        run: |
          echo "CC=gcc-13" >> $GITHUB_ENV
          echo "CXX=g++-13" >> $GITHUB_ENV
      - name: Set compiler env (clang)
        if: matrix.compiler == 'clang'
        run: |
          echo "CC=clang" >> $GITHUB_ENV
          echo "CXX=clang++" >> $GITHUB_ENV

      # ---- Configure + build ----
      - name: Configure
        run: >
          cmake -S . -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DSYMPP_BUILD_TESTS=ON
          -DSYMPP_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build -j

      # ---- Run tests ----
      - name: Test
        run: ./build/tests/sympp_tests

      # ---- Verify install + find_package consumer ----
      - name: Install
        run: cmake --install build --prefix /tmp/sympp_install

      - name: find_package consumer build
        run: |
          mkdir -p /tmp/consumer
          cat > /tmp/consumer/CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.25)
          project(consumer CXX)
          set(CMAKE_CXX_STANDARD 20)
          find_package(SymPP REQUIRED)
          add_executable(demo demo.cpp)
          target_link_libraries(demo PRIVATE SymPP::sympp)
          EOF
          cat > /tmp/consumer/demo.cpp <<'EOF'
          #include <sympp/sympp.hpp>
          #include <iostream>
          int main() {
              using namespace sympp;
              auto x = symbol("x");
              std::cout << diff(sin(x), x)->str() << "\n";
              return 0;
          }
          EOF
          cmake -S /tmp/consumer -B /tmp/consumer/build \
                -DCMAKE_PREFIX_PATH=/tmp/sympp_install
          cmake --build /tmp/consumer/build
